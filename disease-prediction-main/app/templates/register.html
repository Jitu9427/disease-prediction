<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — MediPredict</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="brand-icon">🧬</div>
            <span class="brand-name">MediPredict</span>
        </a>
    </nav>

    <div class="page-wrapper">
        <div class="prediction-page animate-fade" style="max-width: 450px; margin: 40px auto;">
            <div class="page-header">
                <div class="page-header-icon"
                    style="background: var(--accent-gradient); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    📝</div>
                <div class="page-header-text">
                    <h1>Join MediPredict</h1>
                    <p>Create an account to start using AI health tools</p>
                </div>
            </div>

            <div class="form-card animate-slide">
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div class="result-card card-error" style="margin-bottom: 20px; padding: 15px;">
                    {{ messages[0] }}
                </div>
                {% endif %}
                {% endwith %}

                <form action="{{ url_for('register') }}" method="post">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" name="name" id="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-grid" style="margin-bottom: 0;">
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" name="age" id="age" placeholder="e.g. 25" required min="1" max="120">
                        </div>
                        <div class="form-group">
                            <label for="sex">Sex</label>
                            <select name="sex" id="sex" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">Male</option>
                                <option value="0">Female</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" name="email" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" placeholder="At least 6 characters"
                            required minlength="6">
                    </div>
                    <button type="submit" class="btn-predict" style="width: 100%;">Create Account</button>
                </form>

                <p style="margin-top: 20px; text-align: center; color: var(--text-secondary);">
                    Already have an account? <a href="{{ url_for('login') }}"
                        style="color: var(--primary); font-weight: 500;">Log in here</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <span>© 2025 MediPredict. Research use only.</span>
    </footer>
</body>

</html>
