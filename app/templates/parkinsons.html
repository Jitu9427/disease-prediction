<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkinson's Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <a href="/" class="btn-home">← Back to Home</a>
        <h1>Parkinson's Disease Prediction</h1>

        <form action="{{ url_for('parkinsons') }}" method="post">
            <div class="form-group">
                <label for="fo">MDVP:Fo(Hz)</label>
                <input type="number" step="any" name="fo" id="fo" required>
            </div>

            <div class="form-group">
                <label for="fhi">MDVP:Fhi(Hz)</label>
                <input type="number" step="any" name="fhi" id="fhi" required>
            </div>

            <div class="form-group">
                <label for="flo">MDVP:Flo(Hz)</label>
                <input type="number" step="any" name="flo" id="flo" required>
            </div>

            <div class="form-group">
                <label for="jitter_percent">MDVP:Jitter(%)</label>
                <input type="number" step="any" name="jitter_percent" id="jitter_percent" required>
            </div>

            <div class="form-group">
                <label for="jitter_abs">MDVP:Jitter(Abs)</label>
                <input type="number" step="any" name="jitter_abs" id="jitter_abs" required>
            </div>

            <div class="form-group">
                <label for="rap">MDVP:RAP</label>
                <input type="number" step="any" name="rap" id="rap" required>
            </div>

            <div class="form-group">
                <label for="ppq">MDVP:PPQ</label>
                <input type="number" step="any" name="ppq" id="ppq" required>
            </div>

            <div class="form-group">
                <label for="ddp">Jitter:DDP</label>
                <input type="number" step="any" name="ddp" id="ddp" required>
            </div>

            <div class="form-group">
                <label for="shimmer">MDVP:Shimmer</label>
                <input type="number" step="any" name="shimmer" id="shimmer" required>
            </div>

            <div class="form-group">
                <label for="shimmer_db">MDVP:Shimmer(dB)</label>
                <input type="number" step="any" name="shimmer_db" id="shimmer_db" required>
            </div>

            <div class="form-group">
                <label for="apq3">Shimmer:APQ3</label>
                <input type="number" step="any" name="apq3" id="apq3" required>
            </div>

            <div class="form-group">
                <label for="apq5">Shimmer:APQ5</label>
                <input type="number" step="any" name="apq5" id="apq5" required>
            </div>

            <div class="form-group">
                <label for="apq">MDVP:APQ</label>
                <input type="number" step="any" name="apq" id="apq" required>
            </div>

            <div class="form-group">
                <label for="dda">Shimmer:DDA</label>
                <input type="number" step="any" name="dda" id="dda" required>
            </div>

            <div class="form-group">
                <label for="nhr">NHR</label>
                <input type="number" step="any" name="nhr" id="nhr" required>
            </div>

            <div class="form-group">
                <label for="hnr">HNR</label>
                <input type="number" step="any" name="hnr" id="hnr" required>
            </div>

            <div class="form-group">
                <label for="rpde">RPDE</label>
                <input type="number" step="any" name="rpde" id="rpde" required>
            </div>

            <div class="form-group">
                <label for="dfa">DFA</label>
                <input type="number" step="any" name="dfa" id="dfa" required>
            </div>

            <div class="form-group">
                <label for="spread1">spread1</label>
                <input type="number" step="any" name="spread1" id="spread1" required>
            </div>

            <div class="form-group">
                <label for="spread2">spread2</label>
                <input type="number" step="any" name="spread2" id="spread2" required>
            </div>

            <div class="form-group">
                <label for="d2">D2</label>
                <input type="number" step="any" name="d2" id="d2" required>
            </div>

            <div class="form-group">
                <label for="ppe">PPE</label>
                <input type="number" step="any" name="ppe" id="ppe" required>
            </div>

            <button type="submit" class="btn-submit">Predict</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>

</html>
