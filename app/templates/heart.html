<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <a href="/" class="btn-home">← Back to Home</a>
        <h1>Heart Disease Prediction</h1>

        <form action="{{ url_for('heart') }}" method="post">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" step="any" name="age" id="age" required>
            </div>

            <div class="form-group">
                <label for="sex">Sex (1 = Male, 0 = Female)</label>
                <input type="number" step="any" name="sex" id="sex" required>
            </div>

            <div class="form-group">
                <label for="cp">Chest Pain Type (0-3)</label>
                <input type="number" step="any" name="cp" id="cp" required>
            </div>

            <div class="form-group">
                <label for="trestbps">Resting Blood Pressure</label>
                <input type="number" step="any" name="trestbps" id="trestbps" required>
            </div>

            <div class="form-group">
                <label for="chol">Serum Cholestoral (mg/dl)</label>
                <input type="number" step="any" name="chol" id="chol" required>
            </div>

            <div class="form-group">
                <label for="fbs">Fasting Blood Sugar > 120 mg/dl (1 = true; 0 = false)</label>
                <input type="number" step="any" name="fbs" id="fbs" required>
            </div>

            <div class="form-group">
                <label for="restecg">Resting Electrocardiographic Results (0-2)</label>
                <input type="number" step="any" name="restecg" id="restecg" required>
            </div>

            <div class="form-group">
                <label for="thalach">Maximum Heart Rate Achieved</label>
                <input type="number" step="any" name="thalach" id="thalach" required>
            </div>

            <div class="form-group">
                <label for="exang">Exercise Induced Angina (1 = yes; 0 = no)</label>
                <input type="number" step="any" name="exang" id="exang" required>
            </div>

            <div class="form-group">
                <label for="oldpeak">ST Depression Induced by Exercise</label>
                <input type="number" step="any" name="oldpeak" id="oldpeak" required>
            </div>

            <div class="form-group">
                <label for="slope">Slope of the Peak Exercise ST Segment (0-2)</label>
                <input type="number" step="any" name="slope" id="slope" required>
            </div>

            <div class="form-group">
                <label for="ca">Number of Major Vessels (0-3) Colored by Flourosopy</label>
                <input type="number" step="any" name="ca" id="ca" required>
            </div>

            <div class="form-group">
                <label for="thal">Thal (0 = normal; 1 = fixed defect; 2 = reversable defect)</label>
                <input type="number" step="any" name="thal" id="thal" required>
            </div>

            <button type="submit" class="btn-submit">Predict</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>

</html>
