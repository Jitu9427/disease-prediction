name: Disease Prediction CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install Linting & Security Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Security scan with Bandit
      run: |
        bandit -r src/ app/ -ll

  test-app:
    needs: lint-and-security
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install App Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "urllib3<2.0.0"
        pip install -r app-requirements.txt
        pip install pytest 
        pip install -e .
    - name: Run App Tests
      env:
        MLFLOW_TRACKING_URI: "http://localhost:5000"
        TESTING: "True"
        FIREBASE_API_KEY: "dummy"
        FIREBASE_AUTH_DOMAIN: "dummy"
        FIREBASE_PROJECT_ID: "dummy"
        FIREBASE_STORAGE_BUCKET: "dummy"
        FIREBASE_MESSAGING_SENDER_ID: "dummy"
        FIREBASE_APP_ID: "dummy"
        FIREBASE_DATABASE_URL: "https://dummy.firebaseio.com/"
      run: |
        pytest tests/

  run-ml-pipeline:
    needs: lint-and-security
    runs-on: ubuntu-latest
    # Only run training on main branch push to save resources
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install Training Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "urllib3<2.0.0"
        pip install -r requirements.txt
        pip install -e .
    - name: Run ML Pipeline
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      run: |
        python -m src.pipeline

  docker-build-push:
    needs: [test-app]
    runs-on: ubuntu-latest
    # Only run Docker build/push on pushes to main (where secrets are available)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Docker image name
      run: echo "IMAGE=${{ secrets.DOCKER_USERNAME }}/disease-prediction-app" >> $GITHUB_ENV

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.IMAGE }}:latest
          ${{ env.IMAGE }}:${{ github.sha }}
